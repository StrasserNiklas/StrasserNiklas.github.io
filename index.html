<!doctype html>
<html lang="en">

<head>
  <title>Conway´s game of life</title>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes">
  <link rel="stylesheet" type="text/css" href="styles.css" />
  <script src="gameOfLiveElement.js"></script>
  <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png">
  <link rel="manifest" href="/favicons/site.webmanifest">
  <link rel="mask-icon" href="/favicons/safari-pinned-tab.svg" color="#5bbad5">
  <link rel="shortcut icon" href="/favicons/favicon.ico">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="msapplication-config" content="/favicons/browserconfig.xml">
  <meta name="theme-color" content="#ffffff">
</head>

<body>
  <main>
    <h1>Conways´s Game of Life.</h1>

    <div id="toolDiv">
      <button id="start" >Start</button>
      <button id="pause" >Pause</button>
      <button id="clear" >Clear</button>
      <button id="randomize" >Randomize</button>
      <button id="disco" >Disco mode</button>
      
      <div class="tooltip">
        <label>Height: </label>
        <span class="tooltiptext">Height must be atleast 10 and at most 120.</span>
      </div>
      <input id="setHeight" type="text" >
      <div class="tooltip">
        <label>Width: </label>
        <span class="tooltiptext">Width must be atleast 10 and at most 120.</span>
      </div>
      <input id="setWidth" type="text">
      <button id="setSize" >Set size</button>

      <label>Speed (ms): </label>
      <input id="speedSlider" type="range" min="20" max="200" value="100">
      <label id="speedLabel"></label>
      
      <!-- Trigger/Open The Modal -->
      <button id="modalButton">Set levels</button>

      <label>Generations: </label>
      <label id="generationLabel"></label>

      <!-- The Modal -->
      <div id="myModal" class="modal">

        <!-- Modal content -->
        <div class="modal-content">
          <span class="close">&times;</span>
          <textarea id="levelArea"></textarea>
          <button id="loadLevels">Load levels</button>
        </div>

      </div>
    </div>
    <div>
      <cgol-pitch height="25" width="60"></cgol-pitch>
    </div>
  </main>
</body>
</html>
